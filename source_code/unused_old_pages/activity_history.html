<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>InClass - Aktivite Geçmişi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        nav { background: #27ae60; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        .container { max-width: 900px; margin: 30px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #333; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        .pending { background: #ffeaa7; color: #d35400; }
        .approved { background: #55efc4; color: #00b894; }
        .rejected { background: #fab1a0; color: #d63031; }
        .btn-edit { background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-disabled { background: #bdc3c7; color: white; cursor: not-allowed; }
    </style>
</head>
<body>
    <nav>
        <div style="font-size: 20px; font-weight: bold;">📜 Aktivite Geçmişim</div>
        <div class="nav-links">
            <a href="add_activity.html">+ Yeni Ekle</a>
            <a href="leaderboard.html">Liderlik Tablosu</a>
            <button onclick="logout()" style="background:#c0392b; color:white; border:none; padding:8px 15px; margin-left:15px; cursor:pointer; border-radius:5px; font-weight:bold;">Çıkış Yap</button>
        </div>
    </nav>

    <div class="container">
        <h2>Önceki Çalışmalarım</h2>
        <table>
            <thead>
                <tr>
                    <th>Ders</th>
                    <th>Tür</th>
                    <th>Süre (Dk)</th>
                    <th>Durum</th>
                    <th>İşlem</th>
                </tr>
            </thead>
            <tbody id="history-table">
                </tbody>
        </table>
    </div>

    <script>
        async function loadHistory() {
            const userId = localStorage.getItem('user_id');
            const res = await fetch(`http://127.0.0.1:8000/users/${userId}/activities`);
            const data = await res.json();
            const table = document.getElementById('history-table');
            table.innerHTML = '';

            data.forEach(act => {
                const isPending = act.status.toLowerCase() === 'pending';
                table.innerHTML += `
                    <tr>
                        <td>${act.course_id}</td>
                        <td>${act.activity_type}</td>
                        <td>${act.duration_minutes} dk</td>
                        <td><span class="status-badge ${act.status.toLowerCase()}">${act.status}</span></td>
                        <td>
                            ${isPending 
                                ? `<button class="btn-edit" onclick="editAct(${act.id})">Düzenle</button>` 
                                : `<button class="btn-edit btn-disabled" disabled>Kilitli</button>`}
                        </td>
                    </tr>
                `;
            });
        }

        function editAct(id) {
            const newMinutes = prompt("Yeni süreyi girin (Dakika):");
            if(newMinutes) {
                fetch(`http://127.0.0.1:8000/activities/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ duration_minutes: parseInt(newMinutes) })
                }).then(() => loadHistory());
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        window.onload = loadHistory;
    </script>
</body>
</html>
