<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InClass - Giriş</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <h2>InClass Platformu</h2>
      <p class="small">Demo için hesap seçebilir veya manuel giriş yapabilirsin.</p>
      <div class="grid">
        <button class="btn-green" onclick="fillAccount('hoca_a@test.com','123')">Instructor A</button>
        <button onclick="fillAccount('hoca_b@test.com','123')">Instructor B</button>
        <button class="btn-yellow" onclick="fillAccount('ogr_1@test.com','123')">Student 1</button>
        <button class="btn-gray" onclick="fillAccount('ogr_2@test.com','123')">Student 2</button>
      </div>
      <label>E-posta</label>
      <input type="email" id="email" value="hoca_a@test.com" />
      <label>Şifre</label>
      <input type="password" id="password" value="123" onkeypress="if(event.key==='Enter') login()" />
      <button style="width:100%;" class="btn-green" onclick="login()">Giriş Yap</button>
      <p class="small" style="text-align:center;">Hesap yoksa <a href="register.html">kayıt ol</a></p>
      <div id="msg"></div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    function fillAccount(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
    }

    async function login() {
      const msg = document.getElementById('msg');
      msg.innerHTML = '';
      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Giriş başarısız.');

        localStorage.setItem('token', data.token);
        localStorage.setItem('userId', data.id);
        localStorage.setItem('userName', data.name);
        localStorage.setItem('userRole', data.role);

        if (data.role === 'instructor') window.location.href = 'instructor_dashboard.html';
        else window.location.href = 'student_chat.html';
      } catch (err) {
        msg.innerHTML = `<div class="error">${err.message}</div>`;
      }
    }
  </script>
</body>
</html>
