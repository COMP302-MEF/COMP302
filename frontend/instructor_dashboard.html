<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InClass - Hoca Paneli</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-course { background: #3498db; color: white; margin-right: 10px; }
        .btn-start { background: #27ae60; color: white; }
        .btn-stop { background: #e74c3c; color: white; }
        .btn-logout { background: #95a5a6; color: white; }
        .activity-item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-NOT_STARTED { background: #f1c40f; color: #000; }
        .badge-ACTIVE { background: #2ecc71; color: white; }
        .badge-ENDED { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="card header">
        <h2>👨‍🏫 Hoca Paneli</h2>
        <button class="btn-logout" onclick="logout()">Çıkış Yap</button>
    </div>

    <div class="card">
        <h3>📚 Atandığım Dersler</h3>
        <div id="course-list">Yükleniyor...</div>
    </div>

    <div class="card">
        <h3>📝 Ders Aktiviteleri</h3>
        <div id="activity-list">Lütfen yukarıdan bir ders seçin.</div>
    </div>
</div>

<script>
    const userId = localStorage.getItem('userId');
    const userRole = localStorage.getItem('userRole');

    // Güvenlik: Sadece hocalar girebilir
    if (!userId || userRole !== 'instructor') {
        alert("Bu sayfayı görüntüleme yetkiniz yok!");
        window.location.href = 'login.html';
    }

    // 1. Hocanın Derslerini Çek (US-D)
    async function loadCourses() {
        try {
            const res = await fetch(`http://localhost:8000/courses?user_id=${userId}`);
            const courses = await res.json();
            
            let html = '';
            courses.forEach(c => {
                html += `<button class="btn-course" onclick="loadActivities(${c.id})">${c.course_code}</button>`;
            });
            document.getElementById('course-list').innerHTML = html || "Atandığınız ders bulunmuyor.";
        } catch (err) {
            console.error(err);
            document.getElementById('course-list').innerHTML = "Dersler yüklenirken hata oluştu.";
        }
    }

    // 2. Seçilen Dersin Aktivitelerini Çek (US-E)
    async function loadActivities(courseId) {
        document.getElementById('activity-list').innerHTML = "Aktiviteler yükleniyor...";
        try {
            const res = await fetch(`http://localhost:8000/courses/${courseId}/activities?user_id=${userId}`);
            const activities = await res.json();
            
            let html = '';
            activities.forEach(act => {
                html += `
                    <div class="activity-item">
                        <div>
                            <strong>${act.title}</strong><br>
                            <span class="badge badge-${act.status}">${act.status}</span>
                        </div>
                        <div>
                            <button class="btn-start" onclick="changeStatus(${act.id}, 'ACTIVE', ${courseId})">▶️ Başlat</button>
                            <button class="btn-stop" onclick="changeStatus(${act.id}, 'ENDED', ${courseId})">⏹️ Bitir</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('activity-list').innerHTML = html || "Bu derse ait aktivite bulunmuyor.";
        } catch (err) {
            console.error(err);
        }
    }

    // 3. Aktivite Durumunu Güncelle (US-H)
    async function changeStatus(activityId, newStatus, courseId) {
        try {
            const res = await fetch(`http://localhost:8000/activities/${activityId}?user_id=${userId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });

            if (res.ok) {
                loadActivities(courseId); // Tabloyu yenile
            } else {
                alert("Durum güncellenemedi.");
            }
        } catch (err) {
            console.error(err);
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    // Sayfa açıldığında dersleri yükle
    window.onload = loadCourses;
</script>

</body>
</html>
