<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InClass - Eğitmen Paneli</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; }
        nav { background-color: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        .container { max-width: 1000px; margin: 40px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 40px;}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #ecf0f1; color: #333; }
        .badge { background:#3498db; color:white; padding: 5px 10px; border-radius: 15px; font-size: 14px; font-weight: bold; }
        .btn-logout { background: #e74c3c; padding: 8px 15px; border-radius: 5px; color: white; border: none; cursor: pointer; text-decoration: none;}
        .btn-approve { background-color: #2ecc71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px;}
        .btn-reject { background-color: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;}
        .btn-approve:hover { background-color: #27ae60; }
        .btn-reject:hover { background-color: #c0392b; }
        h2 { border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; color: #2c3e50; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 20px; font-weight: bold;">👨‍🏫 Eğitmen Paneli</div>
    <div>
        <span id="user-display" style="color: #f1c40f; margin-right: 20px;"></span>
        <a href="#" class="btn-logout" onclick="logout()">Çıkış Yap</a>
    </div>
</nav>

<div class="container" style="border-left: 5px solid #f39c12;">
    <h2>⏳ Onay Bekleyen Aktiviteler</h2>
    <table id="pending-table">
        <thead>
            <tr>
                <th>Öğrenci</th>
                <th>Ders</th>
                <th>Tür</th>
                <th>Süre</th>
                <th>Açıklama</th>
                <th style="text-align: center;">İşlem</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="6" style="text-align: center;">Yükleniyor...</td></tr>
        </tbody>
    </table>
</div>

<div class="container" style="border-left: 5px solid #3498db;">
    <h2>📊 Sınıf Listesi ve Performanslar</h2>
    <table id="student-table">
        <thead>
            <tr>
                <th>Öğrenci Adı</th>
                <th>E-posta</th>
                <th>Güncel Puan (Sadece Onaylılar)</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="3" style="text-align: center;">Yükleniyor...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const userId = localStorage.getItem('user_id');
    const userRole = localStorage.getItem('user_role');
    const userName = localStorage.getItem('user_name');

    if (!userId || userRole !== 'instructor') {
        alert("Erişim reddedildi. Lütfen eğitmen girişi yapın.");
        window.location.href = 'login.html';
    }

    document.getElementById('user-display').innerText = "Hoş geldin, " + userName;

    // 1. ONAYLI PUANLARI ÇEK
    async function loadStats() {
        const tbody = document.querySelector('#student-table tbody');
        try {
            const response = await fetch(`http://127.0.0.1:8000/instructor/${userId}/dashboard`);
            if (!response.ok) throw new Error("Veri çekilemedi.");
            const stats = await response.json();
            tbody.innerHTML = ''; 

            if (stats.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">Kayıtlı öğrenci bulunamadı.</td></tr>';
                return;
            }

            stats.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${s.name}</strong></td>
                        <td>${s.email}</td>
                        <td><span class="badge">${s.score.toFixed(1)} Puan</span></td>
                    </tr>`;
            });
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: red;">Hata: ${error.message}</td></tr>`;
        }
    }

    // 2. BEKLEYEN AKTİVİTELERİ ÇEK
    async function loadPendingActivities() {
        const tbody = document.querySelector('#pending-table tbody');
        try {
            const response = await fetch(`http://127.0.0.1:8000/instructor/${userId}/pending_activities`);
            if (!response.ok) throw new Error("Veri çekilemedi.");
            const pending = await response.json();
            tbody.innerHTML = '';

            if (pending.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #7f8c8d;">Şu an onay bekleyen aktivite yok.</td></tr>';
                return;
            }

            pending.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${p.student_name}</strong></td>
                        <td>${p.course}</td>
                        <td>${p.type}</td>
                        <td>${p.duration} Dk.</td>
                        <td style="font-style: italic; color: #555;">"${p.description}"</td>
                        <td style="text-align: center;">
                            <button class="btn-approve" onclick="handleActivity(${p.activity_id}, 'approve')">✔ Onayla</button>
                            <button class="btn-reject" onclick="handleActivity(${p.activity_id}, 'reject')">✖ Reddet</button>
                        </td>
                    </tr>`;
            });
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: red;">Hata: ${error.message}</td></tr>`;
        }
    }

    // 3. ONAYLA VEYA REDDET BUTON İŞLEMİ
    async function handleActivity(activityId, action) {
        if (!confirm(`Bu aktiviteyi ${action === 'approve' ? 'onaylamak' : 'reddetmek'} istediğinize emin misiniz?`)) return;

        try {
            const response = await fetch(`http://127.0.0.1:8000/activities/${activityId}/${action}`, {
                method: 'POST'
            });

            if (response.ok) {
                // İşlem başarılıysa tabloları yenile
                loadPendingActivities();
                loadStats();
            } else {
                alert("Bir hata oluştu.");
            }
        } catch (error) {
            alert("Sunucuya ulaşılamadı.");
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    // Sayfa açıldığında her iki tabloyu da doldur
    loadStats();
    loadPendingActivities();
</script>

</body>
</html>
