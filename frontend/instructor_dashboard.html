<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InClass - Eğitmen Paneli</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; margin: 0; }
        nav { background-color: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1100px; margin: 30px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        /* Kategori Yönetimi Alanı */
        .admin-section { background: #ecf0f1; padding: 20px; border-radius: 10px; margin-bottom: 30px; border-left: 5px solid #3498db; }
        .admin-section input { padding: 10px; margin-right: 10px; border: 1px solid #ddd; border-radius: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #34495e; color: white; }
        
        /* Butonlar */
        button { cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #27ae60; color: white; padding: 10px 20px; }
        .btn-approve { background: #2ecc71; color: white; padding: 8px 12px; margin-right: 5px; }
        .btn-reject { background: #e74c3c; color: white; padding: 8px 12px; }
        .btn-reset { background: #95a5a6; color: white; padding: 10px 20px; float: right; }
        .btn-logout { background: #c0392b; color: white; padding: 8px 15px; text-decoration: none; font-size: 14px; }
        
        /* US-J Rehberlik Metinleri */
        .tutoring-note { font-size: 0.85em; max-width: 200px; word-wrap: break-word; line-height: 1.4; }
        .challenges { color: #d35400; font-style: italic; }
        .learned { color: #2980b9; font-weight: 500; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 22px; font-weight: bold;">👨‍🏫 Eğitmen Kontrol Paneli</div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <a href="leaderboard.html" style="color: white; text-decoration: none; font-weight: bold;">🏆 Liderlik Tablosu</a>
        <button onclick="logout()" class="btn-logout">Çıkış Yap</button>
    </div>
</nav>

<div class="container">
    <div class="admin-section">
        <h3>🛠️ Yeni Aktivite Türü Tanımla</h3>
        <input type="text" id="new-type-name" placeholder="Kategori Adı (Örn: Bug Fixing)">
        <input type="number" step="0.1" id="new-type-mult" placeholder="Katsayı (Örn: 1.5)">
        <button class="btn-add" onclick="addActivityType()">Ekle</button>
    </div>

    <h2>📥 Bekleyen Onay İstekleri</h2>
    <table>
        <thead>
            <tr>
                <th>Öğrenci ID</th>
                <th>Ders</th>
                <th>Tür</th>
                <th>Süre</th>
                <th>🤔 Zorluklar (US-J)</th>
                <th>💡 Kazanımlar (US-J)</th>
                <th>İşlem</th>
            </tr>
        </thead>
        <tbody id="pending-table">
            </tbody>
    </table>

    <button class="btn-reset" style="margin-top: 40px;" onclick="resetSystem()">⚠️ Tüm Sistemi Sıfırla</button>
</div>

<script>
    // 1. Bekleyen Aktiviteleri Yükle (US-J Dahil)
    async function loadPending() {
        const res = await fetch('http://127.0.0.1:8000/activities/pending');
        const data = await res.json();
        const table = document.getElementById('pending-table');
        table.innerHTML = data.length ? '' : '<tr><td colspan="7" style="text-align:center;">Bekleyen istek yok.</td></tr>';

        data.forEach(act => {
            table.innerHTML += `
                <tr>
                    <td><b>Student #${act.user_id}</b></td>
                    <td>${act.course_id}</td>
                    <td>${act.activity_type}</td>
                    <td>${act.duration_minutes} dk</td>
                    <td class="tutoring-note challenges">${act.challenges || 'Belirtilmedi'}</td>
                    <td class="tutoring-note learned">${act.learned_points || 'Belirtilmedi'}</td>
                    <td>
                        <button class="btn-approve" onclick="updateStatus(${act.id}, 'Approved')">Onayla</button>
                        <button class="btn-reject" onclick="updateStatus(${act.id}, 'Rejected')">Reddet</button>
                    </td>
                </tr>
            `;
        });
    }

    // 2. Durum Güncelle (Onay/Red)
   // 2. Durum Güncelle (Onay/Red) - YENİ JSON FORMATI
    async function updateStatus(id, status) {
        try {
            const res = await fetch(`http://localhost:8000/activities/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ status: status }) // Yeni backend'in beklediği format
            });

            if (res.ok) {
                loadPending(); // Tabloyu başarıyla yenile
            } else {
                alert("İşlem başarısız oldu.");
            }
        } catch (err) {
            console.error("Hata:", err);
            alert("Sunucuya bağlanılamadı.");
        }
    }

    // 3. Yeni Kategori Ekle (US-F)
    async function addActivityType() {
        const name = document.getElementById('new-type-name').value;
        const multiplier = document.getElementById('new-type-mult').value;
        if(!name || !multiplier) return alert("Lütfen tüm alanları doldurun!");

        const res = await fetch('http://127.0.0.1:8000/activity-types', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, multiplier })
        });
        if(res.ok) {
            alert("Yeni kategori başarıyla eklendi!");
            location.reload();
        }
    }

    // 4. Sistemi Sıfırla (US-M)
    async function resetSystem() {
        if(confirm("TÜM verileri silmek istediğinize emin misiniz? Bu işlem geri alınamaz!")) {
            await fetch('http://127.0.0.1:8000/reset-system', { method: 'DELETE' });
            location.reload();
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    window.onload = loadPending;
</script>

</body>
</html>
