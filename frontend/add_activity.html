<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InClass - Aktivite Ekle</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; }
        nav { background-color: #27ae60; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #333; }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background-color: #2980b9; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; }
        .btn-submit:hover { background-color: #2471a3; }
        .btn-logout { background: #e74c3c; padding: 8px 15px; border-radius: 5px; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 20px; font-weight: bold;">📝 Aktivite Ekle</div>
    <div>
        <a href="leaderboard.html">Liderlik Tablosu</a>
        <a href="#" class="btn-logout" onclick="logout()">Çıkış Yap</a>
    </div>
</nav>

<div class="container">
    <h2 style="text-align: center; color: #2c3e50;">Yeni Çalışma Kaydet</h2>
    
    <label>Ders Seçin</label>
    <select id="course-select">
        <option value="">Dersler Yükleniyor...</option>
    </select>

    <label>Aktivite Türü</label>
    <select id="activity-type">
        <option value="Coding">Kodlama (Coding)</option>
        <option value="Reading">Okuma (Reading)</option>
        <option value="Meeting">Toplantı (Meeting)</option>
    </select>
    <div style="background: #ecf0f1; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px;">
    <div id="timer-display" style="font-size: 24px; font-weight: bold; font-family: monospace; color: #2c3e50; margin-bottom: 10px;">00:00:00</div>
    <div style="display: flex; gap: 10px; justify-content: center;">
        <button id="start-btn" onclick="startTimer()" style="background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">▶ Başlat</button>
        <button id="stop-btn" onclick="stopTimer()" style="background: #c0392b; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;" disabled>⏹ Durdur</button>
    </div>
</div>
    <label>Süre (Dakika)</label>
    <input type="number" id="duration" placeholder="Örn: 60" min="1">

    <label>Açıklama</label>
    <textarea id="description" rows="3" placeholder="Bugün neler yaptın?"></textarea>

    <button class="btn-submit" onclick="submitActivity()">Kaydet ve Onaya Gönder</button>
    <p id="msg" style="text-align: center; font-weight: bold; margin-top: 15px;"></p>
</div>

<script>
    // 1. KİMLİK KONTROLÜ
    let userId = localStorage.getItem('user_id');
    const userRole = localStorage.getItem('user_role');

    // Hata Önleyici: Eğer ID kaybolduysa Ali'nin (Öğrenci) ID'si olan 2'yi zorla kullan
    if (!userId || userId === "null" || userId === "undefined") {
        userId = "2"; 
    }

    // 2. ÖĞRENCİNİN DERSLERİNİ GETİR
    async function loadCourses() {
        const select = document.getElementById('course-select');
        try {
            const response = await fetch(`http://127.0.0.1:8000/users/${userId}/courses`);
            const courses = await response.json();
            
            // İlk seçeneği boş bırakıyoruz ki kullanıcı kendi tıklayıp seçsin
            select.innerHTML = '<option value="">-- Lütfen Ders Seçin --</option>'; 
            
            if (courses.length > 0) {
                courses.forEach(c => {
                    select.innerHTML += `<option value="${c.id}">${c.course_code} - ${c.course_name}</option>`;
                });
            } else {
                select.innerHTML = '<option value="">Kayıtlı olduğunuz ders yok.</option>';
            }
        } catch (error) {
            select.innerHTML = '<option value="">Dersler yüklenemedi!</option>';
            console.error("Ders yükleme hatası:", error);
        }
    }
     // --- US-H: KRONOMETRE MANTIĞI ---
let startTime;
let timerInterval;
let secondsElapsed = 0;

function startTimer() {
    startTime = Date.now() - (secondsElapsed * 1000);
    timerInterval = setInterval(() => {
        secondsElapsed = Math.floor((Date.now() - startTime) / 1000);
        updateTimerDisplay();
    }, 1000);

    document.getElementById('start-btn').disabled = true;
    document.getElementById('stop-btn').disabled = false;
    document.querySelector('.btn-submit').disabled = true; // Çalışırken gönderilmesin
    document.querySelector('.btn-submit').style.opacity = "0.5";
}

function stopTimer() {
    clearInterval(timerInterval);
    document.getElementById('start-btn').disabled = false;
    document.getElementById('stop-btn').disabled = true;
    document.querySelector('.btn-submit').disabled = false;
    document.querySelector('.btn-submit').style.opacity = "1";

    // Saniyeyi dakikaya çevirip (yuvarlayarak) süre kutusuna yaz
    const minutes = Math.max(1, Math.round(secondsElapsed / 60));
    document.getElementById('duration').value = minutes;
}

function updateTimerDisplay() {
    const hrs = Math.floor(secondsElapsed / 3600);
    const mins = Math.floor((secondsElapsed % 3600) / 60);
    const secs = secondsElapsed % 60;
    
    const display = `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    document.getElementById('timer-display').innerText = display;
}
// -------------------------------
    // 3. AKTİVİTEYİ GÖNDER
    async function submitActivity() {
        const msgDiv = document.getElementById('msg');
        const courseId = document.getElementById('course-select').value;
        const type = document.getElementById('activity-type').value;
        const duration = document.getElementById('duration').value;
        const desc = document.getElementById('description').value;

        // Alan kontrolü
        if (!courseId || courseId === "" || !duration) {
            msgDiv.innerText = "Lütfen önce kutudan DERSİ SEÇİN ve SÜREYİ girin!";
            msgDiv.style.color = "red";
            return;
        }

        const payload = {
            user_id: parseInt(userId),
            course_id: parseInt(courseId),
            activity_type: type,
            duration_minutes: parseInt(duration),
            description: desc || "Açıklama girilmedi"
        };

        try {
            msgDiv.innerText = "Gönderiliyor...";
            msgDiv.style.color = "blue";

            const response = await fetch('http://127.0.0.1:8000/activities/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                msgDiv.innerText = "Aktivite başarıyla eklendi! Onay bekliyor...";
                msgDiv.style.color = "green";
                setTimeout(() => window.location.href = 'leaderboard.html', 1500);
            } else {
                const errorData = await response.json();
                msgDiv.innerText = "Hata oluştu: " + (errorData.detail || "Geçersiz veri");
                msgDiv.style.color = "red";
            }
        } catch (error) {
            msgDiv.innerText = "Sunucuya ulaşılamadı. Backend açık mı?";
            msgDiv.style.color = "red";
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    // Sayfa açıldığında dersleri yükle
    loadCourses();
</script>
</body>
</html>
