<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>InClass - Aktivite Ekle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">🚀 InClass Gamification</div>
    <div class="menu">
        <span id="user-display" style="margin-right: 15px; color: #ffc107;"></span>
        <a href="leaderboard.html">Liderlik Tablosu</a>
        <a href="add_activity.html">Aktivite Ekle</a>
        <a href="#" onclick="logout()">Çıkış Yap</a>
    </div>
</nav>

<div class="container">
    <h2>➕ Yeni Aktivite Kaydı</h2>
    <p style="text-align: center; color: #666;">Yaptığın çalışmayı seç ve puanını kazan!</p>
    
    <div style="margin-top: 20px;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">Ders Seçin</label>
        <select id="course_select" style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 20px;">
            <option>Dersler yükleniyor...</option>
        </select>

        <label style="font-weight: bold; display: block; margin-bottom: 5px;">Aktivite Türü</label>
        <select id="activity_type" style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 20px;">
            <option value="Coding">Coding (2.0x Puan)</option>
            <option value="Reading">Reading (1.0x Puan)</option>
            <option value="Meeting">Meeting (1.5x Puan)</option>
            <option value="Other">Other (0.5x Puan)</option>
        </select>

        <label style="font-weight: bold; display: block; margin-bottom: 5px;">Süre (Dakika)</label>
        <input type="number" id="duration" placeholder="Örn: 45" style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 20px;">

        <label style="font-weight: bold; display: block; margin-bottom: 5px;">Kısa Açıklama</label>
        <textarea id="description" rows="3" placeholder="Neler yaptın?" style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 20px;"></textarea>

        <button class="btn-primary" onclick="saveActivity()" style="width: 100%; font-size: 16px;">Kaydet ve Puan Kazan</button>
    </div>
</div>

<script>
    // 1. GÜVENLİK VE HOŞGELDİN MESAJI
    if (!localStorage.getItem('user_id')) {
        window.location.href = 'login.html';
    }
    document.getElementById('user-display').innerText = localStorage.getItem('user_name');

    // 2. KAYITLI DERSLERİ YÜKLE (US-E)
    async function loadMyCourses() {
        const userId = localStorage.getItem('user_id');
        try {
            const response = await fetch(`http://127.0.0.1:8000/users/${userId}/courses`);
            const courses = await response.json();
            
            const courseSelect = document.getElementById('course_select');
            courseSelect.innerHTML = ''; 

            if (courses.length === 0) {
                courseSelect.innerHTML = '<option value="">Hiçbir derse kayıtlı değilsiniz</option>';
                return;
            }

            courses.forEach(course => {
                courseSelect.innerHTML += `<option value="${course.id}">${course.course_code}</option>`;
            });
        } catch (error) {
            console.error("Dersler yüklenirken hata:", error);
        }
    }

    // 3. AKTİVİTEYİ KAYDET
    async function saveActivity() {
        const activityData = {
            user_id: parseInt(localStorage.getItem('user_id')),
            course_id: parseInt(document.getElementById('course_select').value),
            activity_type: document.getElementById('activity_type').value,
            duration_minutes: parseInt(document.getElementById('duration').value),
            description: document.getElementById('description').value
        };

        if (!activityData.course_id || !activityData.duration_minutes) {
            alert("Lütfen ders ve süre bilgilerini eksiksiz girin!");
            return;
        }

        try {
            const response = await fetch('http://127.0.0.1:8000/activities/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(activityData)
            });

            if (response.ok) {
                alert("Aktivite başarıyla kaydedildi! Puanın güncellendi.");
                window.location.href = 'leaderboard.html';
            } else {
                const err = await response.json();
                alert("Hata: " + err.detail);
            }
        } catch (error) {
            alert("Sunucuya bağlanılamadı!");
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    // Sayfa açıldığında dersleri getir
    loadMyCourses();
</script>
</body>
</html>
