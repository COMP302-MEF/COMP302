<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>InClass - Aktivite Ekle</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        nav { background: #27ae60; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        .card { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .timer-box { background: #f9f9f9; padding: 20px; text-align: center; border-radius: 10px; border: 2px dashed #27ae60; margin-bottom: 15px; }
        #timer-display { font-size: 32px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; }
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-start { background: #27ae60; color: white; }
        .btn-stop { background: #e74c3c; color: white; }
        .btn-submit { background: #3498db; color: white; width: 100%; margin-top: 15px; }
        .btn-logout { background: #c0392b; color: white; padding: 8px 15px; }
    </style>
</head>
<body>
    <nav>
        <div style="font-size: 20px; font-weight: bold;">📝 Aktivite Girişi</div>
        <div class="nav-links">
            <a href="activity_history.html">Geçmişim</a>
            <a href="leaderboard.html">Liderlik Tablosu</a>
            <button onclick="logout()" class="btn-logout" style="margin-left:15px; cursor:pointer; border-radius:5px; border:none;">Çıkış Yap</button>
        </div>
    </nav>

    <div class="card">
        <h2>🚀 Yeni Çalışma Başlat</h2>
        <select id="course_id" required>
            <option value="">-- Ders Seçin --</option>
            <option value="COMP302">COMP302 - Software Engineering</option>
            <option value="COMP201">COMP201 - Computer Architecture</option>
        </select>

        <select id="type" required>
            <option value="">-- Aktivite Türü Yükleniyor... --</option>
        </select>

        <div class="timer-box">
            <div id="timer-display">00:00:00</div>
            <button class="btn-start" id="start-btn" onclick="startTimer()">▶ Başlat</button>
            <button class="btn-stop" id="stop-btn" onclick="stopTimer()" disabled>⏹ Durdur</button>
        </div>

        <input type="number" id="duration" placeholder="Süre (Dakika)" readonly>
        <textarea id="desc" placeholder="Neler yaptığınızı kısaca anlatın..."></textarea>
        <button class="btn-submit" id="save-btn" onclick="save()" disabled style="opacity: 0.5;">Onaya Gönder</button>
    </div>

    <script>
        let seconds = 0, interval;

        // Sayfa açıldığında kategorileri backend'den çek (Dinamik Liste)
        async function loadActivityTypes() {
            try {
                const res = await fetch('http://127.0.0.1:8000/activity-types');
                const types = await res.json();
                const typeSelect = document.getElementById('type');
                typeSelect.innerHTML = '<option value="">-- Aktivite Türü Seçin --</option>';
                types.forEach(t => {
                    typeSelect.innerHTML += `<option value="${t.name}">${t.name} (x${t.multiplier})</option>`;
                });
            } catch (err) { console.error("Türler yüklenemedi"); }
        }
        window.onload = loadActivityTypes;

        function startTimer() {
            interval = setInterval(() => { seconds++; updateDisplay(); }, 1000);
            document.getElementById('start-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
        }

        function stopTimer() {
            clearInterval(interval);
            document.getElementById('duration').value = Math.max(1, Math.round(seconds / 60));
            document.getElementById('save-btn').disabled = false;
            document.getElementById('save-btn').style.opacity = "1";
        }

        function updateDisplay() {
            let h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
            document.getElementById('timer-display').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        async function save() {
            const data = {
                user_id: localStorage.getItem('user_id'),
                course_id: document.getElementById('course_id').value,
                activity_type: document.getElementById('type').value,
                duration_minutes: document.getElementById('duration').value,
                description: document.getElementById('desc').value
            };
            if(!data.course_id || !data.activity_type) return alert("Lütfen tüm alanları doldurun!");
            
            const res = await fetch('http://127.0.0.1:8000/activities', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)
            });
            if(res.ok) { alert("Onaya gönderildi!"); window.location.href = "activity_history.html"; }
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
