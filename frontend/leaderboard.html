<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>InClass - Liderlik Tablosu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">🚀 InClass Gamification</div>
    <div class="menu">
        <span id="user-display"></span>
        <a href="leaderboard.html">Liderlik Tablosu</a>
        <a href="add_activity.html">Aktivite Ekle</a>
        <a href="#" onclick="logout()">Çıkış Yap</a>
    </div>
</nav>

<div class="container">
    <h2>🏆 Haftalık Liderlik Tablosu</h2>
    <table id="leaderboard-table" style="width:100%; border-collapse: collapse; margin-top: 20px;">
        <thead style="background: #f1f1f1;">
            <tr>
                <th style="padding:12px; text-align:left;">Sıra</th>
                <th style="padding:12px; text-align:left;">Öğrenci</th>
                <th style="padding:12px; text-align:right;">Toplam Puan</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    // Kullanıcı ismini göster
    document.getElementById('user-display').innerText = "Selam, " + localStorage.getItem('user_name');

    async function fetchLeaderboard() {
        const response = await fetch('http://127.0.0.1:8000/leaderboard');
        const data = await response.json();
        const tbody = document.querySelector('#leaderboard-table tbody');
        tbody.innerHTML = '';

        data.forEach((item, index) => {
            tbody.innerHTML += `
                <tr>
                    <td style="padding:12px; border-bottom:1px solid #eee;">${index + 1}</td>
                    <td style="padding:12px; border-bottom:1px solid #eee;">${item.full_name}</td>
                    <td style="padding:12px; border-bottom:1px solid #eee; text-align:right; font-weight:bold;">${item.total_score}</td>
                </tr>`;
        });
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    fetchLeaderboard();
</script>
</body>
</html>
