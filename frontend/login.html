<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>InClass - Giriş Yap</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        #message { text-align: center; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>InClass Giriş</h2>
    <input type="email" id="email" placeholder="E-posta Adresi" required>
    <input type="password" id="password" placeholder="Şifre" required>
    <button onclick="handleLogin()">Giriş Yap</button>
    <div id="message"></div>
</div>

<script>
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        try {
            const response = await fetch('http://127.0.0.1:8000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                messageDiv.style.color = "green";
                messageDiv.innerText = "Giriş başarılı! Yönlendiriliyorsunuz...";
                
                // Kullanıcı bilgilerini tarayıcı hafızasına saklayalım (Session)
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('user_name', data.full_name);
                localStorage.setItem('user_role', data.role);

                // Bir sonraki sayfaya yönlendir (Şimdilik leaderboard'a gitsin)
                setTimeout(() => { window.location.href = 'leaderboard.html'; }, 1500);
            } else {
                messageDiv.style.color = "red";
                messageDiv.innerText = data.detail || "Giriş başarısız.";
            }
        } catch (error) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Sunucuya bağlanılamadı.";
        }
    }
</script>

</body>
</html>
