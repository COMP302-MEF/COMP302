<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InClass - Giriş Yap</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #3498db; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>InClass Platformu</h2>
    <p>Lütfen giriş yapın</p>
    
    <input type="email" id="email" placeholder="E-posta Adresi" value="hoca_a@test.com">
    <input type="password" id="password" placeholder="Şifre" value="123">
    
    <button onclick="login()">Giriş Yap</button>
</div>

<script>
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('http://localhost:8000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                const data = await res.json();
                
                // GÜVENLİK İÇİN BİLGİLERİ TARAYICIYA KAYDET
                localStorage.setItem('userId', data.id);
                localStorage.setItem('userName', data.name);
                localStorage.setItem('userRole', data.role); // Hoca paneli buraya bakıyor!

                alert("Giriş Başarılı! Yönlendiriliyorsunuz...");

                // Rolüne göre doğru sayfaya yönlendir
                if (data.role === 'instructor') {
                    window.location.href = 'instructor_dashboard.html';
                } else {
                    window.location.href = 'student_chat.html'; // Birazdan bunu yazacağız
                }
            } else {
                alert("Hatalı e-posta veya şifre!");
            }
        } catch (err) {
            console.error(err);
            alert("Sunucuya bağlanılamadı. Uvicorn açık mı?");
        }
    }
</script>

</body>
</html>
