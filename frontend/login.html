<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InClass - Giriş</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 14px; background-color: #3498db; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-primary:hover { background-color: #2980b9; }
        #msg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #2c3e50;">🚀 InClass Giriş</h2>
    
    <label>E-posta</label>
    <input type="email" id="email" placeholder="ornek@uni.edu.tr">

    <label>Şifre</label>
    <input type="password" id="password" placeholder="••••••••">

    <button onclick="loginUser()" class="btn-primary">Giriş Yap</button>
    <p id="msg"></p>
</div>

<script>
    async function loginUser() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msgDiv = document.getElementById('msg');

        if (!email || !password) {
            msgDiv.innerText = "Lütfen tüm alanları doldurun!";
            msgDiv.style.color = "red";
            return;
        }

        try {
            msgDiv.innerText = "Giriş yapılıyor...";
            msgDiv.style.color = "blue";

            const response = await fetch('http://127.0.0.1:8000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                const data = await response.json();
                
                // HAFIZAYI TEMİZLE VE YENİDEN YAZ
                localStorage.clear();
                localStorage.setItem('user_id', data.id);
                localStorage.setItem('user_name', data.full_name);
                localStorage.setItem('user_role', data.role);

                msgDiv.innerText = `Hoş geldin ${data.full_name}! Yönlendiriliyorsun...`;
                msgDiv.style.color = "green";

                // AKILLI YÖNLENDİRME (Kilit Nokta Burası!)
                setTimeout(() => {
                    if (data.role === 'instructor') {
                        window.location.href = 'instructor_dashboard.html'; // Hocayı hoca paneline at
                    } else {
                        window.location.href = 'leaderboard.html'; // Öğrenciyi liderlik tablosuna at
                    }
                }, 1000);

            } else {
                msgDiv.innerText = "Hatalı e-posta veya şifre!";
                msgDiv.style.color = "red";
            }
        } catch (error) {
            msgDiv.innerText = "Sunucuya bağlanılamadı!";
            msgDiv.style.color = "red";
        }
    }
</script>

</body>
</html>
