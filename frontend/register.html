<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>InClass - Kayıt Ol</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #27ae60; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; }
        h2 { text-align: center; color: #2c3e50; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #219150; }
        .login-link { text-align: center; margin-top: 15px; font-size: 14px; }
        a { color: #27ae60; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>📝 Yeni Hesap Oluştur</h2>
        <input type="text" id="name" placeholder="Ad Soyad" required>
        <input type="email" id="email" placeholder="E-posta" required>
        <input type="password" id="password" placeholder="Şifre" required>
        
        <label style="font-size: 14px; color: #7f8c8d;">Sistemdeki Rolünüz:</label>
        <select id="role">
            <option value="student">Öğrenci</option>
            <option value="instructor">Eğitmen (Hoca)</option>
        </select>

        <button onclick="register()">Kayıt Ol</button>
        <div class="login-link">Zaten hesabınız var mı? <a href="login.html">Giriş Yap</a></div>
    </div>

    <script>
        async function register() {
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

         // register.html içindeki fetch kısmını böyle güncelle:
const res = await fetch('http://127.0.0.1:8000/register', {
    method: 'POST',
    mode: 'cors', // Bunu eklemek tarayıcıya CORS isteği olduğunu açıkça söyler
    headers: {
        'Content-Type': 'application/json'
    },
    body: JSON.stringify(data)
});
            const result = await res.json();
            if (res.ok) {
                alert(result.msg);
                window.location.href = 'login.html';
            } else {
                alert(result.detail);
            }
        }
    </script>
</body>
</html>
